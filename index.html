<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MU Taxi Booking/ Items Order Form</title>

  <style>
   body {
  font-family: Arial;
  background: #f8fafc; /* nền sáng */
  color: #1e293b;
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}

/* card form */
.form-box {
  background: #ffffff;
  padding: 30px;
  border-radius: 14px;
  width: 100%;
  max-width: 420px;

  box-shadow: 
    0 10px 25px rgba(0,0,0,0.08),
    0 2px 8px rgba(0,0,0,0.05);
}

/* title */
h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #0f172a;
}

/* input */
input, textarea {
  width: 100%;
  margin-bottom: 12px;
  padding: 11px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  background: #f8fafc;
  color: #0f172a;
}

/* focus đẹp hơn */
input:focus, textarea:focus {
  border-color: #22c55e;
  outline: none;
  box-shadow: 0 0 0 2px rgba(34,197,94,0.2);
}

/* button */
button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
  border-radius: 8px;
  font-weight: bold;
  color: white;
  cursor: pointer;
}

/* hover */
button:hover {
  transform: translateY(-1px);
  box-shadow: 0 5px 12px rgba(34,197,94,0.3);
}

/* success */
.success {
  display: none;
  color: #16a34a;
  text-align: center;
  margin-top: 10px;
}
  </style>
</head>

<body>

  <div class="form-box">
    <h2>🚕 MU Taxi Booking/ Items Order Form</h2>

    <form id="orderForm">
      <input name="name" placeholder="Your character name" required>
      <input name="server" placeholder="Server" required>
      <input name="level" placeholder="Level">

      <textarea name="request" placeholder="Your request (e.g. Taxi SOD 7days / Buy 200K Ruud / Buy Items ID Wing-010/ etc.) "></textarea>

      <input name="contact" placeholder="Discord / WhatApps / Zalo / Messenger">

      <button type="submit">Submit Order</button>
    </form>

    <div class="success" id="successMsg">
      ✅ Request sent ! I will contact you soon !
    </div>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzwkDb2VtPjVXid4yY3MfR29uBz11A8DLwWw2wgiBmzSpx67_u-f_SPmi79dx_YN9HLcg/exec";

    const form = document.getElementById("orderForm");
    const successMsg = document.getElementById("successMsg");

    form.addEventListener("submit", e => {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify(data)
      })
      .then(res => res.json())
      .then(() => {
        form.reset();
        successMsg.style.display = "block";
      })
      .catch(err => alert("Lỗi gửi form"));
    });
  </script>

</body>
</html>
