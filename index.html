<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MU Taxi Booking / Items Order</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.form-box {
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
  width: 100%;
  max-width: 420px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: none;
  outline: none;
  background: #0f172a;
  color: #fff;
}

textarea {
  min-height: 90px;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

button:disabled {
  opacity: 0.6;
}

.success {
  display: none;
  text-align: center;
  margin-top: 10px;
  color: #4ade80;
}
</style>
</head>

<body>

<div class="form-box">
  <h2>🚕 MU Taxi Booking / Items Order</h2>

  <form id="orderForm">
    <input type="text" name="name" placeholder="Character name" required>
    <input type="text" name="server" placeholder="Server" required>
    <input type="text" name="level" placeholder="Level">
    <textarea name="request" placeholder="Taxi / Items / Ruud..."></textarea>
    <input type="text" name="contact" placeholder="Discord / Zalo / WhatApps/ Messenger">

    <button type="submit">Submit Order</button>
  </form>

  <div id="successMsg" class="success">
    ✅ Request sent! I will contact you soon.
  </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzwkDb2VtPjVXid4yY3MfR29uBz11A8DLwWw2wgiBmzSpx67_u-f_SPmi79dx_YN9HLcg/exec";

const form = document.getElementById("orderForm");
const successMsg = document.getElementById("successMsg");
const btn = form.querySelector("button");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  btn.disabled = true;
  btn.innerText = "Sending...";

  const data = {
    name: form.name.value,
    server: form.server.value,
    level: form.level.value,
    request: form.request.value,
    contact: form.contact.value
  };

  fetch(scriptURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => {
    form.reset();
    successMsg.style.display = "block";
  })
  .catch(() => {
    alert("Submit failed");
  })
  .finally(() => {
    btn.disabled = false;
    btn.innerText = "Submit Order";
  });
});
</script>

</body>
</html>
