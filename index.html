<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MU Taxi Booking / Items Order</title>

<style>
body {
  font-family: Arial;
  background: radial-gradient(circle at top, #0b1120, #020617 80%);
  color: #e2e8f0;
  display: flex;
  justify-content: center;
  padding: 40px;
}

/* BOX */
.form-box {
  background: rgba(15, 23, 42, 0.85);
  padding: 30px;
  border-radius: 14px;
  width: 100%;
  max-width: 420px;

  border: 1px solid rgba(59, 130, 246, 0.2);
  box-shadow:
    0 0 30px rgba(59, 130, 246, 0.15),
    inset 0 0 10px rgba(139, 92, 246, 0.1);

  backdrop-filter: blur(8px);
}

/* TITLE */
h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #93c5fd;
}

/* NOTE */
.note {
  font-size: 12px;
  opacity: 0.7;
  margin-bottom: 15px;
  text-align: center;
}

/* INPUT */
input, textarea {
  width: 100%;
  margin-bottom: 12px;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid rgba(59, 130, 246, 0.2);
  background: #020617;
  color: #e2e8f0;
  outline: none;
  transition: 0.25s;
}

input::placeholder, textarea::placeholder {
  color: #64748b;
}

input:focus, textarea:focus {
  border-color: #60a5fa;
  box-shadow: 0 0 10px rgba(96, 165, 250, 0.6);
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;

  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  color: white;

  transition: 0.25s;
}

button:hover {
  transform: translateY(-1px);
  box-shadow:
    0 0 15px rgba(139, 92, 246, 0.6),
    0 0 25px rgba(59, 130, 246, 0.4);
}

/* STATUS */
.loading {
  display: none;
  text-align: center;
  margin-top: 10px;
  color: #facc15;
}

.success {
  display: none;
  color: #4ade80;
  text-align: center;
  margin-top: 10px;
}

.error {
  display: none;
  color: #f87171;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="form-box">
  <h2>🚕 MU Taxi / Order Form</h2>

  <div class="note">
    Premium: Free taxi (active member)<br>
    Standard: Non-profit guild member<br>
    Service: Paid for outsiders
  </div>

  <form id="orderForm">

    <input name="name" placeholder="Character Name *" required>

    <input name="server" placeholder="Server *" required>

    <input name="level" placeholder="Level (optional)">

    <textarea name="request" placeholder="Request (Taxi / Buy Items / Ruud...)" required></textarea>

    <input name="contact" placeholder="Contact (Discord / WhatsApp / etc.)" required>

    <button type="submit" id="submitBtn">Submit Order</button>

  </form>

  <div class="loading" id="loadingMsg">⏳ Sending request...</div>

  <div class="success" id="successMsg">
    ✅ Request sent! I will contact you soon.
  </div>

  <div class="error" id="errorMsg">
    ❌ Failed to send. Try again.
  </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzwkDb2VtPjVXid4yY3MfR29uBz11A8DLwWw2wgiBmzSpx67_u-f_SPmi79dx_YN9HLcg/exec";

const form = document.getElementById("orderForm");
const loading = document.getElementById("loadingMsg");
const successMsg = document.getElementById("successMsg");
const errorMsg = document.getElementById("errorMsg");
const submitBtn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  successMsg.style.display = "none";
  errorMsg.style.display = "none";

  loading.style.display = "block";
  submitBtn.disabled = true;
  submitBtn.innerText = "Sending...";

  const formData = new FormData(form);
  const data = Object.fromEntries(formData.entries());

  try {
    const res = await fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify(data),
      headers: {
        "Content-Type": "application/json"
      }
    });

    if (!res.ok) throw new Error();

    form.reset();
    successMsg.style.display = "block";
  } catch (err) {
    errorMsg.style.display = "block";
  }

  loading.style.display = "none";
  submitBtn.disabled = false;
  submitBtn.innerText = "Submit Order";
});
</script>

</body>
</html>
