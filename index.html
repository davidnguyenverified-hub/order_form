<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MU Taxi Booking/ Items Order Form</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .form-box {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .success {
      display: none;
      color: #4ade80;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="form-box">
    <h2>🚕 MU Taxi Booking/ Items Order Form</h2>

    <form id="orderForm">
      <input name="name" placeholder="Your character name" required>
      <input name="server" placeholder="Server" required>
      <input name="level" placeholder="Level">

      <textarea name="request" placeholder="Your request (e.g. Taxi SOD 7days / Buy 200K Ruud / Buy Items ID Wing-010/ etc.) "></textarea>

      <input name="contact" placeholder="Discord / WhatApps / Zalo / Messenger">

      <button type="submit">Submit Order</button>
    </form>

    <div class="success" id="successMsg">
      ✅ Request sent ! I will contact you soon !
    </div>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzwkDb2VtPjVXid4yY3MfR29uBz11A8DLwWw2wgiBmzSpx67_u-f_SPmi79dx_YN9HLcg/exec";

    const form = document.getElementById("orderForm");
    const successMsg = document.getElementById("successMsg");

    form.addEventListener("submit", e => {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify(data)
      })
      .then(res => res.json())
      .then(() => {
        form.reset();
        successMsg.style.display = "block";
      })
      .catch(err => alert("Lỗi gửi form"));
    });
  </script>

</body>
</html>
